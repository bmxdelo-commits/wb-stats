name: WB Daily Report

on:
  schedule:
    # Каждый день в 09:00 МСК (= 06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Позволяет запустить вручную из интерфейса GitHub

concurrency:
  group: wb-daily-report
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get install -y fonts-noto-color-emoji
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run WB report
        env:
          WB_TOKEN:     ${{ secrets.WB_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python wb_report_html.py

      - name: Notify Telegram on failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="⚠️ WB отчёт не сформирован%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
