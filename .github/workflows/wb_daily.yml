name: WB Daily Report

on:
  schedule:
    # Каждый день в 09:00 МСК (= 06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests>=2.31.0 matplotlib>=3.5.0 numpy>=1.24.0

      - name: Run WB report
        env:
          WB_TOKEN:     ${{ secrets.WB_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python wb_report.py
